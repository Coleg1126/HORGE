<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>Daylist Planner</title>
  <style>
    :root {
      --page-bg: #000000;
      --surface: #121216;
      --surface-2: #1d1d23;
      --text: #ffffff;
      --muted: #7d7d84;
      --line: #2b2b31;
      --accent: #6c63ff;
      --accent-contrast: #ffffff;
      --danger: #ff6b6b;
      --reminder-default: #6c63ff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--page-bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
    }

    button, input, select {
      font: inherit;
    }

    button {
      color: inherit;
    }

    .app {
      width: min(100%, 980px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 26px 22px 110px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 0 18px;
      background: linear-gradient(var(--page-bg) 75%, transparent);
      backdrop-filter: blur(10px);
    }

    .month-title {
      margin: 0;
      font-size: clamp(2.2rem, 8vw, 4rem);
      line-height: .98;
      letter-spacing: -0.055em;
      font-weight: 800;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .circle-button {
      display: grid;
      place-items: center;
      width: 54px;
      height: 54px;
      border: 1px solid color-mix(in srgb, var(--text) 12%, transparent);
      border-radius: 999px;
      background: var(--surface-2);
      cursor: pointer;
      font-size: 1.55rem;
      transition: transform .15s ease, background .15s ease;
    }

    .circle-button:hover { background: color-mix(in srgb, var(--surface-2) 88%, var(--text)); }
    .circle-button:active { transform: scale(.97); }

    .circle-button.settings {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-contrast);
      font-size: 1rem;
      font-weight: 800;
    }

    .hidden-date-input {
      position: fixed;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .day-section {
      padding: 24px 0 28px;
      border-bottom: 1px solid var(--line);
    }

    .day-section:first-child {
      padding-top: 12px;
    }

    .day-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 10px;
    }

    .day-date {
      font-size: clamp(1.55rem, 5vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.035em;
    }

    .day-weekday {
      font-size: clamp(1.25rem, 4vw, 2rem);
      color: var(--muted);
      font-weight: 700;
    }

    .day-section.today .day-date,
    .day-section.today .day-weekday {
      color: var(--accent);
    }

    .day-divider {
      height: 3px;
      border-radius: 999px;
      background: var(--text);
      opacity: .95;
    }

    .day-section.today .day-divider {
      background: var(--accent);
    }

    .tasks {
      display: grid;
      gap: 0;
      margin-top: 7px;
    }

    .task-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 11px;
      min-height: 58px;
      border-bottom: 1px solid var(--line);
      padding: 8px 8px 8px 0;
    }

    .task-pill {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 36px;
      border-radius: 999px;
      background: var(--task-color);
      color: var(--task-text-color, #ffffff);
      padding: 8px 14px;
      box-shadow: inset 0 -1px 0 rgba(255,255,255,.10);
    }

    .task-text {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: clamp(1rem, 3.8vw, 1.4rem);
    }

    .task-row.completed .task-pill {
      opacity: .58;
      filter: saturate(.78);
    }

    .task-row.completed .task-text {
      color: inherit;
      text-decoration: line-through;
      text-decoration-thickness: 2px;
    }

    .check-button,
    .delete-button {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      cursor: pointer;
      background: transparent;
    }

    .check-button {
      border: 3px solid var(--text);
      font-weight: 900;
      padding: 0;
    }

    .check-button::after {
      content: "✓";
      opacity: 0;
      transform: scale(.7);
      transition: .15s ease;
    }

    .task-row.completed .check-button {
      border-color: var(--task-color);
      background: var(--task-color);
      color: var(--accent-contrast);
    }

    .task-row.completed .check-button::after {
      opacity: 1;
      transform: scale(1);
    }

    .delete-button {
      border: 0;
      color: var(--muted);
      font-size: 1.3rem;
      opacity: .45;
    }

    .delete-button:hover {
      color: var(--danger);
      opacity: 1;
    }

    .add-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }

    .color-picker-wrap {
      position: relative;
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-2);
      padding: 0;
    }

    .color-swatch {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 1.5px solid color-mix(in srgb, var(--text) 16%, transparent);
      background: color-mix(in srgb, var(--task-brush-color, var(--reminder-default)) 16%, var(--surface-2));
      pointer-events: none;
    }

    .color-swatch svg {
      width: 16px;
      height: 16px;
      color: var(--task-brush-color, var(--reminder-default));
      display: block;
    }

    .task-color-input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .task-input {
      min-width: 0;
      width: 100%;
      min-height: 46px;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      padding: 10px 2px;
    }

    .task-input::placeholder {
      color: var(--muted);
    }

    .task-input:focus {
      border-bottom-color: var(--accent);
    }

    .add-button {
      min-height: 42px;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: var(--accent-contrast);
      padding: 0 16px;
      cursor: pointer;
      font-weight: 800;
    }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(115px, 1fr));
      gap: 1px;
      overflow-x: auto;
      background: var(--line);
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .week-column {
      min-height: 560px;
      background: var(--page-bg);
      padding: 13px 10px;
    }

    .week-column.today {
      box-shadow: inset 0 3px 0 var(--accent);
    }

    .week-day-label {
      margin-bottom: 12px;
      font-weight: 800;
      color: var(--muted);
    }

    .week-column.today .week-day-label {
      color: var(--accent);
    }

    .week-task {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      width: 100%;
      min-height: 36px;
      margin-bottom: 8px;
      border-radius: 999px;
      background: var(--task-color);
      color: var(--task-text-color, #ffffff);
      padding: 8px 12px;
      font-size: .84rem;
      line-height: 1.2;
      overflow: hidden;
    }

    .week-task span:last-child {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .week-task.completed {
      opacity: .55;
      text-decoration: line-through;
    }

    .month-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(92px, 1fr));
      gap: 1px;
      overflow-x: auto;
      background: var(--line);
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .month-weekday {
      min-width: 92px;
      background: var(--surface);
      color: var(--muted);
      padding: 10px;
      text-align: center;
      font-size: .8rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .month-cell {
      min-width: 92px;
      min-height: 130px;
      background: var(--page-bg);
      padding: 8px;
      cursor: pointer;
      overflow: hidden;
    }

    .month-cell.other-month {
      opacity: .35;
    }

    .month-cell.today {
      box-shadow: inset 0 0 0 2px var(--accent);
    }

    .month-day-number {
      margin-bottom: 7px;
      font-weight: 800;
    }

    .month-cell.today .month-day-number {
      color: var(--accent);
    }

    .month-task {
      display: block;
      margin-bottom: 6px;
      border-radius: 999px;
      background: var(--task-color);
      color: var(--task-text-color, #ffffff);
      padding: 5px 9px;
      font-size: .7rem;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: inset 0 -1px 0 rgba(255,255,255,.10);
    }

    .month-task.completed {
      opacity: .5;
      text-decoration: line-through;
    }

    .empty-note {
      color: var(--muted);
      font-size: .9rem;
      padding: 14px 0;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 20;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      width: min(330px, calc(100% - 34px));
      transform: translateX(-50%);
      border: 1px solid color-mix(in srgb, var(--text) 14%, transparent);
      border-radius: 999px;
      background: color-mix(in srgb, var(--surface-2) 92%, transparent);
      padding: 7px;
      backdrop-filter: blur(20px);
      box-shadow: 0 12px 36px rgba(0,0,0,.35);
    }

    .nav-button {
      display: grid;
      place-items: center;
      min-height: 54px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.2rem;
    }

    .nav-button.active {
      background: var(--text);
      color: var(--page-bg);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: flex-end;
      justify-content: center;
      background: rgba(0,0,0,.62);
      padding: 16px;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .settings-panel {
      width: min(620px, 100%);
      max-height: min(82vh, 760px);
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--surface);
      padding: 22px;
      box-shadow: 0 24px 70px rgba(0,0,0,.45);
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .settings-header h2 {
      margin: 0;
      font-size: 1.45rem;
    }

    .close-button {
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 999px;
      background: var(--surface-2);
      cursor: pointer;
      font-size: 1.2rem;
    }

    .setting-group {
      display: grid;
      gap: 14px;
      padding: 16px 0;
      border-top: 1px solid var(--line);
    }

    .setting-group:first-of-type {
      border-top: 0;
    }

    .setting-title {
      font-weight: 800;
    }

    .setting-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
    }

    .setting-row label {
      color: var(--muted);
    }

    .setting-color {
      width: 52px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: transparent;
      padding: 2px;
      cursor: pointer;
    }

    .preset-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .preset-button {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-2);
      padding: 9px 13px;
      cursor: pointer;
    }

    .danger-button {
      border: 1px solid color-mix(in srgb, var(--danger) 60%, var(--line));
      border-radius: 12px;
      background: transparent;
      color: var(--danger);
      padding: 11px 14px;
      cursor: pointer;
    }


    .picker-backdrop {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      align-items: flex-end;
      justify-content: center;
      background: rgba(0,0,0,.58);
      padding: 10px;
    }

    .picker-backdrop.open {
      display: flex;
    }

    .color-sheet {
      width: min(560px, 100%);
      max-height: min(84vh, 720px);
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 26px 26px 20px 20px;
      background: var(--surface);
      padding: 12px 18px calc(20px + env(safe-area-inset-bottom));
      box-shadow: 0 -18px 60px rgba(0,0,0,.42);
    }

    .sheet-handle {
      width: 42px;
      height: 5px;
      margin: 1px auto 14px;
      border-radius: 999px;
      background: var(--muted);
      opacity: .55;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .sheet-header h2 {
      margin: 0;
      font-size: 1.25rem;
    }

    .sheet-section {
      margin-top: 20px;
    }

    .sheet-label {
      display: block;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: .82rem;
      font-weight: 800;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .recent-colors,
    .preset-colors {
      display: grid;
      gap: 12px;
    }

    .recent-colors {
      grid-template-columns: repeat(5, 1fr);
    }

    .preset-colors {
      grid-template-columns: repeat(5, 1fr);
    }

    .palette-color {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      min-height: 48px;
      border: 3px solid transparent;
      border-radius: 999px;
      background: var(--palette-color);
      cursor: pointer;
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--text) 18%, transparent),
        inset 0 0 0 1px rgba(255,255,255,.12);
    }

    .palette-color.selected {
      border-color: var(--text);
      box-shadow:
        0 0 0 3px var(--surface),
        0 0 0 5px var(--text);
    }

    .palette-color::after {
      content: "✓";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: white;
      font-size: 1.05rem;
      font-weight: 1000;
      opacity: 0;
      text-shadow: 0 1px 3px rgba(0,0,0,.65);
    }

    .palette-color.selected::after {
      opacity: 1;
    }

    .custom-color-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface-2);
      padding: 10px 12px;
    }

    .custom-color-copy strong {
      display: block;
      font-size: .95rem;
    }

    .custom-color-copy span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: .78rem;
    }

    .custom-color-control {
      position: relative;
      width: 52px;
      height: 52px;
      overflow: hidden;
      border-radius: 999px;
      border: 2px solid color-mix(in srgb, var(--text) 20%, transparent);
      background: var(--custom-preview, var(--accent));
    }

    .custom-color-control input {
      position: absolute;
      inset: -10px;
      width: 72px;
      height: 72px;
      opacity: 0;
      cursor: pointer;
    }

    .sheet-done-button {
      width: 100%;
      min-height: 52px;
      margin-top: 22px;
      border: 0;
      border-radius: 16px;
      background: var(--accent);
      color: var(--accent-contrast);
      font-weight: 850;
      cursor: pointer;
    }

    .color-picker-wrap {
      cursor: pointer;
    }

    .task-color-input {
      display: none;
    }

    .color-swatch::after {
      content: "";
      position: absolute;
      right: 7px;
      bottom: 7px;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--task-brush-color, var(--reminder-default));
      box-shadow: 0 0 0 2px var(--surface-2);
      opacity: .95;
    }

    @media (max-width: 650px) {
      .app {
        padding: 20px 18px 105px;
      }

      .circle-button {
        width: 48px;
        height: 48px;
      }

      .top-actions {
        gap: 7px;
      }

      .month-title {
        font-size: 2.55rem;
      }

      .day-section {
        padding-block: 20px;
      }

      .delete-button {
        width: 30px;
        opacity: .65;
      }

      .week-grid {
        grid-template-columns: repeat(7, 124px);
      }

      .month-grid {
        grid-template-columns: repeat(7, 105px);
      }

      .month-weekday,
      .month-cell {
        min-width: 105px;
      }
    }

    @media (max-width: 390px) {
      .month-title {
        font-size: 2.2rem;
      }

      .circle-button {
        width: 44px;
        height: 44px;
      }

      .task-row {
        grid-template-columns: 1fr auto;
      }

      .delete-button {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1 class="month-title" id="mainTitle">Jul 2026</h1>
      <div class="top-actions">
        <button class="circle-button settings" id="settingsButton" type="button" aria-label="Open settings">U</button>
        <button class="circle-button" id="previousButton" type="button" aria-label="Previous">‹</button>
        <button class="circle-button" id="nextButton" type="button" aria-label="Next">›</button>
      </div>
    </header>

    <input class="hidden-date-input" id="datePicker" type="date" />

    <section class="view active" id="dayView"></section>
    <section class="view" id="weekView"></section>
    <section class="view" id="monthView"></section>
  </main>

  <nav class="bottom-nav" aria-label="Planner views">
    <button class="nav-button" type="button" data-view="month" aria-label="Month view">▦</button>
    <button class="nav-button active" type="button" data-view="day" aria-label="Day list view">▤</button>
    <button class="nav-button" type="button" data-view="week" aria-label="Week view">□</button>
  </nav>


  <div class="picker-backdrop" id="colorPickerModal">
    <section class="color-sheet" role="dialog" aria-modal="true" aria-labelledby="colorPickerTitle">
      <div class="sheet-handle" aria-hidden="true"></div>
      <div class="sheet-header">
        <h2 id="colorPickerTitle">Reminder color</h2>
        <button class="close-button" id="closeColorPickerButton" type="button" aria-label="Close color picker">×</button>
      </div>

      <div class="sheet-section">
        <span class="sheet-label">Most used</span>
        <div class="recent-colors" id="recentColors"></div>
      </div>

      <div class="sheet-section">
        <span class="sheet-label">Preset colors</span>
        <div class="preset-colors" id="presetColors"></div>
      </div>

      <div class="sheet-section">
        <span class="sheet-label">Custom</span>
        <label class="custom-color-row">
          <span class="custom-color-copy">
            <strong>Choose any color</strong>
            <span>Opens the iPhone color wheel</span>
          </span>
          <span class="custom-color-control" id="customColorPreview">
            <input id="customReminderColor" type="color" aria-label="Choose a custom reminder color" />
          </span>
        </label>
      </div>

      <button class="sheet-done-button" id="colorPickerDoneButton" type="button">Use this color</button>
    </section>
  </div>

  <div class="modal-backdrop" id="settingsModal">
    <section class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="settings-header">
        <h2 id="settingsTitle">Appearance settings</h2>
        <button class="close-button" id="closeSettingsButton" type="button" aria-label="Close settings">×</button>
      </div>

      <div class="setting-group">
        <div class="setting-title">Quick themes</div>
        <div class="preset-row">
          <button class="preset-button" type="button" data-theme="dark">Dark</button>
          <button class="preset-button" type="button" data-theme="light">Light</button>
          <button class="preset-button" type="button" data-theme="purple">Purple</button>
          <button class="preset-button" type="button" data-theme="sage">Sage</button>
        </div>
      </div>

      <div class="setting-group">
        <div class="setting-title">Page colors</div>
        <div class="setting-row">
          <label for="pageBackgroundColor">Page background</label>
          <input class="setting-color" id="pageBackgroundColor" type="color" />
        </div>
        <div class="setting-row">
          <label for="surfaceColor">Panel background</label>
          <input class="setting-color" id="surfaceColor" type="color" />
        </div>
        <div class="setting-row">
          <label for="textColor">Main text</label>
          <input class="setting-color" id="textColor" type="color" />
        </div>
        <div class="setting-row">
          <label for="mutedTextColor">Secondary text</label>
          <input class="setting-color" id="mutedTextColor" type="color" />
        </div>
        <div class="setting-row">
          <label for="accentColor">Accent color</label>
          <input class="setting-color" id="accentColor" type="color" />
        </div>
        <div class="setting-row">
          <label for="defaultReminderColor">Default reminder bubble</label>
          <input class="setting-color" id="defaultReminderColor" type="color" />
        </div>
      </div>

      <div class="setting-group">
        <div class="setting-title">Data</div>
        <button class="danger-button" id="clearAllButton" type="button">Delete all planner items</button>
      </div>
    </section>
  </div>

  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "daylist_simple_planner_v1";
      const SETTINGS_KEY = "daylist_simple_planner_settings_v2";

      const defaultSettings = {
        pageBg: "#000000",
        surface: "#121216",
        surface2: "#1d1d23",
        text: "#ffffff",
        muted: "#7d7d84",
        line: "#2b2b31",
        accent: "#6c63ff",
        accentContrast: "#ffffff",
        reminderDefault: "#6c63ff",
        colorUsage: {}
      };

      const presetReminderColors = [
        "#ff5d5d", "#ff8a3d", "#ffbd3e", "#f2df4d", "#8fcf58",
        "#48c78e", "#39c6bd", "#42a5f5", "#5d7cff", "#6c63ff",
        "#9a68e8", "#d061d8", "#ef6aa8", "#a67c52", "#8b8b93"
      ];

      const themes = {
        dark: {
          pageBg: "#000000",
          surface: "#121216",
          surface2: "#1d1d23",
          text: "#ffffff",
          muted: "#7d7d84",
          line: "#2b2b31",
          accent: "#6c63ff",
          accentContrast: "#ffffff",
          reminderDefault: "#6c63ff"
        },
        light: {
          pageBg: "#f7f4ed",
          surface: "#ffffff",
          surface2: "#ebe7df",
          text: "#22201d",
          muted: "#7c756c",
          line: "#d9d3ca",
          accent: "#5665d8",
          accentContrast: "#ffffff",
          reminderDefault: "#5665d8"
        },
        purple: {
          pageBg: "#180f24",
          surface: "#28183a",
          surface2: "#38234d",
          text: "#fff8ff",
          muted: "#b8a7c7",
          line: "#4a315e",
          accent: "#c58cff",
          accentContrast: "#1d1027",
          reminderDefault: "#c58cff"
        },
        sage: {
          pageBg: "#eef2eb",
          surface: "#ffffff",
          surface2: "#dde6da",
          text: "#233128",
          muted: "#748079",
          line: "#ccd6c9",
          accent: "#4f7b62",
          accentContrast: "#ffffff",
          reminderDefault: "#7da88d"
        }
      };

      const el = {
        mainTitle: document.getElementById("mainTitle"),
        previousButton: document.getElementById("previousButton"),
        nextButton: document.getElementById("nextButton"),
        settingsButton: document.getElementById("settingsButton"),
        datePicker: document.getElementById("datePicker"),
        dayView: document.getElementById("dayView"),
        weekView: document.getElementById("weekView"),
        monthView: document.getElementById("monthView"),
        navButtons: [...document.querySelectorAll(".nav-button")],
        settingsModal: document.getElementById("settingsModal"),
        closeSettingsButton: document.getElementById("closeSettingsButton"),
        pageBackgroundColor: document.getElementById("pageBackgroundColor"),
        surfaceColor: document.getElementById("surfaceColor"),
        textColor: document.getElementById("textColor"),
        mutedTextColor: document.getElementById("mutedTextColor"),
        accentColor: document.getElementById("accentColor"),
        defaultReminderColor: document.getElementById("defaultReminderColor"),
        clearAllButton: document.getElementById("clearAllButton"),
        themeButtons: [...document.querySelectorAll("[data-theme]")],
        colorPickerModal: document.getElementById("colorPickerModal"),
        closeColorPickerButton: document.getElementById("closeColorPickerButton"),
        colorPickerDoneButton: document.getElementById("colorPickerDoneButton"),
        recentColors: document.getElementById("recentColors"),
        presetColors: document.getElementById("presetColors"),
        customReminderColor: document.getElementById("customReminderColor"),
        customColorPreview: document.getElementById("customColorPreview")
      };

      let data = loadData();
      let settings = loadSettings();
      let currentView = "day";
      let selectedDate = startOfDay(new Date());
      let currentMonth = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
      let activeColorSelection = settings.reminderDefault;
      let activeColorCallback = null;

      normalizeTasks();
      applySettings();
      render();

      function startOfDay(date) {
        return new Date(date.getFullYear(), date.getMonth(), date.getDate());
      }

      function startOfWeek(date) {
        const d = startOfDay(date);
        d.setDate(d.getDate() - d.getDay());
        return d;
      }

      function addDays(date, amount) {
        const d = new Date(date);
        d.setDate(d.getDate() + amount);
        return d;
      }

      function addMonths(date, amount) {
        return new Date(date.getFullYear(), date.getMonth() + amount, 1);
      }

      function isSameDay(a, b) {
        return a.getFullYear() === b.getFullYear() &&
          a.getMonth() === b.getMonth() &&
          a.getDate() === b.getDate();
      }

      function dateKey(date) {
        return [
          date.getFullYear(),
          String(date.getMonth() + 1).padStart(2, "0"),
          String(date.getDate()).padStart(2, "0")
        ].join("-");
      }

      function getContrastTextColor(color) {
        const value = String(color || "").replace("#", "");
        const hex = value.length === 3
          ? value.split("").map(ch => ch + ch).join("")
          : value.padEnd(6, "0").slice(0, 6);

        const r = parseInt(hex.slice(0, 2), 16);
        const g = parseInt(hex.slice(2, 4), 16);
        const b = parseInt(hex.slice(4, 6), 16);

        const luminance = (0.299 * r) + (0.587 * g) + (0.114 * b);
        return luminance > 165 ? "#111111" : "#ffffff";
      }

      function fromDateKey(value) {
        const [y, m, d] = value.split("-").map(Number);
        return new Date(y, m - 1, d);
      }

      function loadData() {
        try {
          const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY));
          return parsed && typeof parsed.tasksByDate === "object" ? parsed : { tasksByDate: {} };
        } catch {
          return { tasksByDate: {} };
        }
      }

      function loadSettings() {
        try {
          const stored = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}");
          return {
            ...defaultSettings,
            ...stored,
            colorUsage: stored.colorUsage && typeof stored.colorUsage === "object"
              ? stored.colorUsage
              : {}
          };
        } catch {
          return { ...defaultSettings };
        }
      }

      function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      function saveSettings() {
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
      }

      function normalizeTasks() {
        Object.values(data.tasksByDate).forEach(tasks => {
          if (!Array.isArray(tasks)) return;
          tasks.forEach(task => {
            if (!task.color) task.color = settings.reminderDefault;
          });
        });
        saveData();
      }

      function getTasks(date) {
        const key = dateKey(date);
        if (!Array.isArray(data.tasksByDate[key])) data.tasksByDate[key] = [];
        return data.tasksByDate[key];
      }

      function applySettings() {
        const root = document.documentElement.style;
        root.setProperty("--page-bg", settings.pageBg);
        root.setProperty("--surface", settings.surface);
        root.setProperty("--surface-2", settings.surface2);
        root.setProperty("--text", settings.text);
        root.setProperty("--muted", settings.muted);
        root.setProperty("--line", settings.line);
        root.setProperty("--accent", settings.accent);
        root.setProperty("--accent-contrast", settings.accentContrast);
        root.setProperty("--reminder-default", settings.reminderDefault);
        document.querySelector('meta[name="theme-color"]').setAttribute("content", settings.pageBg);

        el.pageBackgroundColor.value = settings.pageBg;
        el.surfaceColor.value = settings.surface;
        el.textColor.value = settings.text;
        el.mutedTextColor.value = settings.muted;
        el.accentColor.value = settings.accent;
        el.defaultReminderColor.value = settings.reminderDefault;
        el.settingsButton.textContent = "U";
      }

      function render() {
        el.dayView.classList.toggle("active", currentView === "day");
        el.weekView.classList.toggle("active", currentView === "week");
        el.monthView.classList.toggle("active", currentView === "month");

        el.navButtons.forEach(button => {
          button.classList.toggle("active", button.dataset.view === currentView);
        });

        if (currentView === "day") renderDayList();
        if (currentView === "week") renderWeek();
        if (currentView === "month") renderMonth();
      }

      function updateTitle() {
        const date = currentView === "month" ? currentMonth : selectedDate;
        el.mainTitle.textContent = date.toLocaleDateString(undefined, {
          month: "short",
          year: "numeric"
        });
      }

      function renderDayList() {
        updateTitle();
        el.dayView.innerHTML = "";

        const start = selectedDate;
        const daysToShow = 14;

        for (let i = 0; i < daysToShow; i++) {
          const day = addDays(start, i);
          const section = document.createElement("section");
          section.className = `day-section${isSameDay(day, new Date()) ? " today" : ""}`;

          const heading = document.createElement("div");
          heading.className = "day-heading";

          const dateLabel = document.createElement("div");
          dateLabel.className = "day-date";
          dateLabel.textContent = day.toLocaleDateString(undefined, {
            day: "numeric",
            month: "short"
          });

          const weekday = document.createElement("div");
          weekday.className = "day-weekday";
          weekday.textContent = day.toLocaleDateString(undefined, { weekday: "short" });

          const divider = document.createElement("div");
          divider.className = "day-divider";

          const tasksContainer = document.createElement("div");
          tasksContainer.className = "tasks";

          getTasks(day).forEach(task => {
            tasksContainer.appendChild(createTaskRow(day, task));
          });

          const addRow = createAddRow(day);
          heading.append(dateLabel, weekday);
          section.append(heading, divider, tasksContainer, addRow);
          el.dayView.appendChild(section);
        }
      }

      function createTaskRow(day, task) {
        const row = document.createElement("div");
        row.className = `task-row${task.completed ? " completed" : ""}`;
        row.style.setProperty("--task-color", task.color || settings.reminderDefault);
        row.style.setProperty("--task-text-color", getContrastTextColor(task.color || settings.reminderDefault));

        const pill = document.createElement("div");
        pill.className = "task-pill";

        const text = document.createElement("div");
        text.className = "task-text";
        text.textContent = task.text;
        pill.appendChild(text);

        const check = document.createElement("button");
        check.type = "button";
        check.className = "check-button";
        check.setAttribute("aria-label", task.completed ? "Mark incomplete" : "Complete");
        check.addEventListener("click", () => {
          task.completed = !task.completed;
          saveData();
          render();
        });

        const remove = document.createElement("button");
        remove.type = "button";
        remove.className = "delete-button";
        remove.textContent = "×";
        remove.setAttribute("aria-label", "Delete item");
        remove.addEventListener("click", () => {
          const key = dateKey(day);
          data.tasksByDate[key] = getTasks(day).filter(item => item.id !== task.id);
          if (!data.tasksByDate[key].length) delete data.tasksByDate[key];
          saveData();
          render();
        });

        row.append(pill, check, remove);
        return row;
      }

      function createAddRow(day) {
        const form = document.createElement("form");
        form.className = "add-row";

        const colorWrap = document.createElement("button");
        colorWrap.type = "button";
        colorWrap.className = "color-picker-wrap";
        colorWrap.setAttribute("aria-label", "Choose reminder color");

        const swatch = document.createElement("div");
        swatch.className = "color-swatch";
        swatch.innerHTML = `
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none">
            <path d="M14.7 4.3l5 5M5.5 18.5l3.1-.7 9.8-9.8a1.8 1.8 0 0 0 0-2.6l-.8-.8a1.8 1.8 0 0 0-2.6 0l-9.8 9.8-.7 3.1Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4.8 19.2c.8-.1 1.4.1 1.9.6.5.5.7 1.1.6 1.9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        `;
        let selectedColor = settings.reminderDefault;
        swatch.style.setProperty("--task-brush-color", selectedColor);

        colorWrap.addEventListener("click", () => {
          openColorPicker(selectedColor, color => {
            selectedColor = color;
            swatch.style.setProperty("--task-brush-color", color);
          });
        });

        const input = document.createElement("input");
        input.type = "text";
        input.className = "task-input";
        input.placeholder = "Add something";
        input.maxLength = 240;

        const button = document.createElement("button");
        button.type = "submit";
        button.className = "add-button";
        button.textContent = "Add";

        form.addEventListener("submit", event => {
          event.preventDefault();
          const value = input.value.trim();
          if (!value) return;

          getTasks(day).push({
            id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
            text: value,
            completed: false,
            color: selectedColor,
            createdAt: new Date().toISOString()
          });

          recordColorUse(selectedColor);
          saveData();
          render();
        });

        colorWrap.appendChild(swatch);
        form.append(colorWrap, input, button);
        return form;
      }

      function recordColorUse(color) {
        const normalized = String(color).toLowerCase();
        settings.colorUsage[normalized] = (settings.colorUsage[normalized] || 0) + 1;
        saveSettings();
      }

      function getMostUsedColors() {
        const ranked = Object.entries(settings.colorUsage || {})
          .sort((a, b) => b[1] - a[1])
          .map(([color]) => color);

        const fallback = [
          settings.reminderDefault,
          ...presetReminderColors
        ];

        return [...new Set([...ranked, ...fallback])].slice(0, 5);
      }

      function openColorPicker(initialColor, callback) {
        activeColorSelection = initialColor || settings.reminderDefault;
        activeColorCallback = callback;
        el.customReminderColor.value = activeColorSelection;
        el.customColorPreview.style.setProperty("--custom-preview", activeColorSelection);
        renderColorChoices();
        el.colorPickerModal.classList.add("open");
      }

      function closeColorPicker(applySelection = false) {
        if (applySelection && activeColorCallback) {
          activeColorCallback(activeColorSelection);
        }

        el.colorPickerModal.classList.remove("open");
        activeColorCallback = null;
      }

      function renderColorChoices() {
        el.recentColors.innerHTML = "";
        el.presetColors.innerHTML = "";

        getMostUsedColors().forEach(color => {
          el.recentColors.appendChild(createPaletteButton(color));
        });

        presetReminderColors.forEach(color => {
          el.presetColors.appendChild(createPaletteButton(color));
        });
      }

      function createPaletteButton(color) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "palette-color";
        button.style.setProperty("--palette-color", color);
        button.setAttribute("aria-label", `Choose ${color}`);
        button.classList.toggle(
          "selected",
          color.toLowerCase() === activeColorSelection.toLowerCase()
        );

        button.addEventListener("click", () => {
          activeColorSelection = color;
          el.customReminderColor.value = color;
          el.customColorPreview.style.setProperty("--custom-preview", color);
          renderColorChoices();
        });

        return button;
      }

      function renderWeek() {
        updateTitle();
        el.weekView.innerHTML = "";

        const grid = document.createElement("div");
        grid.className = "week-grid";
        const weekStart = startOfWeek(selectedDate);

        for (let i = 0; i < 7; i++) {
          const day = addDays(weekStart, i);
          const column = document.createElement("section");
          column.className = `week-column${isSameDay(day, new Date()) ? " today" : ""}`;

          const label = document.createElement("div");
          label.className = "week-day-label";
          label.textContent = day.toLocaleDateString(undefined, {
            weekday: "short",
            day: "numeric"
          });

          column.appendChild(label);

          const tasks = getTasks(day);
          if (!tasks.length) {
            const empty = document.createElement("div");
            empty.className = "empty-note";
            empty.textContent = "Nothing";
            column.appendChild(empty);
          } else {
            tasks.forEach(task => {
              const card = document.createElement("div");
              card.className = `week-task${task.completed ? " completed" : ""}`;
              card.style.setProperty("--task-color", task.color || settings.reminderDefault);
              card.style.setProperty("--task-text-color", getContrastTextColor(task.color || settings.reminderDefault));

              const text = document.createElement("span");
              text.textContent = task.text;

              card.append(text);
              card.addEventListener("click", () => {
                selectedDate = day;
                currentView = "day";
                render();
                window.scrollTo({ top: 0, behavior: "smooth" });
              });
              column.appendChild(card);
            });
          }

          grid.appendChild(column);
        }

        el.weekView.appendChild(grid);
      }

      function renderMonth() {
        updateTitle();
        el.monthView.innerHTML = "";

        const grid = document.createElement("div");
        grid.className = "month-grid";

        ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].forEach(name => {
          const label = document.createElement("div");
          label.className = "month-weekday";
          label.textContent = name;
          grid.appendChild(label);
        });

        const first = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1);
        const gridStart = addDays(first, -first.getDay());

        for (let i = 0; i < 42; i++) {
          const day = addDays(gridStart, i);
          const cell = document.createElement("section");
          cell.className = "month-cell";

          if (day.getMonth() !== currentMonth.getMonth()) cell.classList.add("other-month");
          if (isSameDay(day, new Date())) cell.classList.add("today");

          const number = document.createElement("div");
          number.className = "month-day-number";
          number.textContent = day.getDate();
          cell.appendChild(number);

          getTasks(day).forEach(task => {
            const item = document.createElement("div");
            item.className = `month-task${task.completed ? " completed" : ""}`;
            item.style.setProperty("--task-color", task.color || settings.reminderDefault);
            item.style.setProperty("--task-text-color", getContrastTextColor(task.color || settings.reminderDefault));
            item.textContent = task.text;
            cell.appendChild(item);
          });

          cell.addEventListener("click", () => {
            selectedDate = day;
            currentMonth = new Date(day.getFullYear(), day.getMonth(), 1);
            currentView = "day";
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
          });

          grid.appendChild(cell);
        }

        el.monthView.appendChild(grid);
      }

      function navigate(direction) {
        if (currentView === "month") {
          currentMonth = addMonths(currentMonth, direction);
          selectedDate = new Date(currentMonth);
        } else if (currentView === "week") {
          selectedDate = addDays(selectedDate, direction * 7);
          currentMonth = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
        } else {
          selectedDate = addDays(selectedDate, direction * 7);
          currentMonth = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
        }

        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function openSettings() {
        el.settingsModal.classList.add("open");
      }

      function closeSettings() {
        el.settingsModal.classList.remove("open");
      }

      el.previousButton.addEventListener("click", () => navigate(-1));
      el.nextButton.addEventListener("click", () => navigate(1));
      el.settingsButton.addEventListener("click", openSettings);
      el.closeSettingsButton.addEventListener("click", closeSettings);

      el.settingsModal.addEventListener("click", event => {
        if (event.target === el.settingsModal) closeSettings();
      });

      el.navButtons.forEach(button => {
        button.addEventListener("click", () => {
          currentView = button.dataset.view;
          if (currentView === "month") {
            currentMonth = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
          }
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });

      el.themeButtons.forEach(button => {
        button.addEventListener("click", () => {
          settings = {
            ...themes[button.dataset.theme],
            colorUsage: settings.colorUsage || {}
          };
          saveSettings();
          applySettings();
          render();
        });
      });

      const settingBindings = [
        [el.pageBackgroundColor, "pageBg"],
        [el.surfaceColor, "surface"],
        [el.textColor, "text"],
        [el.mutedTextColor, "muted"],
        [el.accentColor, "accent"],
        [el.defaultReminderColor, "reminderDefault"]
      ];

      settingBindings.forEach(([input, key]) => {
        input.addEventListener("input", () => {
          settings[key] = input.value;
          if (key === "surface") {
            settings.surface2 = input.value;
          }
          saveSettings();
          applySettings();
          render();
        });
      });


      el.closeColorPickerButton.addEventListener("click", () => closeColorPicker(false));
      el.colorPickerDoneButton.addEventListener("click", () => closeColorPicker(true));

      el.colorPickerModal.addEventListener("click", event => {
        if (event.target === el.colorPickerModal) closeColorPicker(false);
      });

      el.customReminderColor.addEventListener("input", () => {
        activeColorSelection = el.customReminderColor.value;
        el.customColorPreview.style.setProperty("--custom-preview", activeColorSelection);
        renderColorChoices();
      });

      el.clearAllButton.addEventListener("click", () => {
        if (!confirm("Delete every planner item? This cannot be undone.")) return;
        data = { tasksByDate: {} };
        saveData();
        render();
        closeSettings();
      });
    })();
  </script>
</body>
</html>
